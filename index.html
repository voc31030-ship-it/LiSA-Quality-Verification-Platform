<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LiSA Digital Compliance & Verification Platform</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="description"
    content="Liberia Standards Authority (LiSA) digital quality certificate registry and compliance verification portal. Secure institutional gateway.">
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div style="display: flex; justify-content: center; margin-bottom: 24px;">
        <img src="logo.jpg" alt="LiSA Logo" style="height: 64px; width: auto; border-radius: 8px;">
      </div>
      <h2>LiSA</h2>
      <p class="login-subtitle">Liberia Standards Authority Compliance Portal</p>

      <form id="lisa-login-form">
        <!-- Email -->
        <div class="form-group">
          <label for="login-email">Authorized Email Address</label>
          <input type="email" id="login-email" class="input-control" placeholder="e.g. inspector@lisa.gov.lr" value="admin@lisa.gov.lr" required
            autocomplete="email">
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="login-password">System Password</label>
          <input type="password" id="login-password" class="input-control" placeholder="Enter secure credentials" value="admin123"
            required autocomplete="current-password">
        </div>

        <!-- Row actions -->
        <div class="form-actions-row">
          <label class="checkbox-label">
            <input type="checkbox" id="login-remember" checked>
            <span>Keep session active</span>
          </label>
          <a href="#" class="forgot-link" id="lisa-forgot-password">Reset access</a>
        </div>

        <button type="submit" class="btn-primary">
          <span>Authorize and Enter</span>
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
          </svg>
        </button>
        <p id="login-error" class="form-error" style="display:none; margin-top:12px; color:#f43f5e; font-size:0.95rem;"></p>
      </form>


    </div>
  </div>

  <!-- State Coordination scripts -->
  <script src="state.js"></script>
  <script src="navigation.js"></script>
  <script>
    // Handle standard credentials login
    document.getElementById("lisa-login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value.trim();
      const errorEl = document.getElementById("login-error");
      errorEl.style.display = "none";
      errorEl.textContent = "";

      try {
        const session = await window.lisaState.loginWithPassword(email, password);
        if (session.role === "supervisor") {
          window.location.href = "supervisor.html";
        } else {
          window.location.href = "dashboard.html";
        }
      } catch (err) {
        errorEl.style.display = "block";
        errorEl.textContent = err?.message || "Authentication failed. Please check your credentials.";
      }
    });

    // Handle Quick Login Shortcuts
    function quickLogin(email, role) {
      window.lisaState.login(email, role);
      if (role === "supervisor") {
        window.location.href = "supervisor.html";
      } else {
        window.location.href = "dashboard.html";
      }
    }

    

    // Forgot password flow simulator
    document.getElementById("lisa-forgot-password").addEventListener("click", (e) => {
      e.preventDefault();
      const email = prompt("Enter your authorized LSA email address to request a security key reset:");
      if (email) {
        alert(`A cryptographically secure password reset request has been dispatched to ${email}. Please check your official agency inbox.`);
      }
    });
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Management - LiSA Verification Platform</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Styling for the QR Grid Cards */
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    
    .qr-card {
      background-color: var(--lisa-white);
      border-radius: 12px;
      border: 1px solid var(--lisa-border);
      box-shadow: var(--shadow-sm);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      transition: all 0.2s;
    }
    
    .qr-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .qr-card-img-box {
      border: 1px solid var(--lisa-border);
      padding: 12px;
      background-color: var(--lisa-white);
      border-radius: 8px;
      margin: 8px 0;
    }

    .qr-card-img {
      width: 140px;
      height: 140px;
      object-fit: contain;
    }

    /* Print Label layout */
    .print-label-badge {
      display: none;
      width: 100%;
      border: 2px solid var(--lisa-gold);
      background-color: var(--lisa-white);
      padding: 16px;
      border-radius: 8px;
      text-align: left;
      font-family: var(--font-sans);
      margin-top: 10px;
      position: relative;
    }

    @media print {
      body * {
        visibility: hidden;
      }
      .printable-section, .printable-section * {
        visibility: visible;
      }
      .printable-section {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar and Topbar injected by navigation.js -->
    
    <main class="main-content">
      <div class="content-body" style="margin-top: 24px;">
        
        <!-- Welcome Header -->
        <div class="analytics-card-header" style="border-bottom:none; margin-bottom: 8px; padding-bottom:0;">
          <div>
            <h2 style="font-size: 26px; font-weight: 800;">Digital QR Code Console</h2>
            <p style="color:var(--text-muted); font-size:14px; margin-top:2px;">Download, export, and generate printable standard label identifier tags.</p>
          </div>
          <div>
            <button class="btn-secondary" onclick="window.print()">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <rect x="6" y="14" width="12" height="8"></rect>
              </svg>
              <span>Print QR Batch</span>
            </button>
          </div>
        </div>

        <!-- QR Controls & Searches -->
        <div class="ledger-card" style="padding: 16px 20px; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center;">
          <input type="text" id="qr-search" class="form-input" style="width: 280px;" placeholder="Search QR manufacturer or ID...">
          <select id="qr-filter-status" class="filter-select" style="width:160px;">
            <option value="ALL">All Statuses</option>
            <option value="VALID">Active & Verified</option>
            <option value="REVOKED">Revoked Flags</option>
            <option value="EXPIRED">Expired Clearances</option>
          </select>
        </div>

        <!-- QR Cards Grid -->
        <div class="qr-grid" id="qr-cards-container">
          <!-- Dynamically populated -->
        </div>

      </div>
    </main>
  </div>

  <!-- Hidden Print Label Mock Container -->
  <div class="printable-section" id="print-matrix-area" style="display:none;"></div>

  <!-- State, Navigation, and QR Management Scripts -->
  <script src="state.js"></script>
  <script src="navigation.js"></script>
  <script>
    let certificates = [];

    document.addEventListener("DOMContentLoaded", async () => {
      await loadCertificatesData();
      renderQRCards();

      // Search & filters
      document.getElementById("qr-search").addEventListener("input", renderQRCards);
      document.getElementById("qr-filter-status").addEventListener("change", renderQRCards);
    });

    async function loadCertificatesData() {
      certificates = await window.lisaState.getCertificatesAsync();
    }

    function renderQRCards() {
      const container = document.getElementById("qr-cards-container");
      container.innerHTML = "";

      const search = document.getElementById("qr-search").value.toLowerCase().trim();
      const statusFilter = document.getElementById("qr-filter-status").value;

      const filtered = certificates.filter(c => {
        const matchSearch = c.id.toLowerCase().includes(search) || 
                            c.manufacturer.toLowerCase().includes(search) || 
                            c.productName.toLowerCase().includes(search) ||
                            c.verificationId.toLowerCase().includes(search);
        
        const matchStatus = statusFilter === 'ALL' || c.status === statusFilter;
        return matchSearch && matchStatus;
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div style="grid-column: span 3; text-align:center; color:var(--text-muted); padding: 40px;">No registered certificates matched your QR search parameters.</div>`;
        return;
      }

      filtered.forEach(c => {
        const card = document.createElement("div");
        card.className = "qr-card";

        const verifyUrl = window.location.origin + '/verify.html?id=' + c.verificationId;
        const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(verifyUrl)}`;

        card.innerHTML = `
          <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <span class="status-badge ${c.status.toLowerCase()}">${c.status}</span>
            <span class="mono-id">${c.id}</span>
          </div>

          <div class="qr-card-img-box">
            <img id="qr-img-${c.id}" class="qr-card-img" src="${qrImageUrl}" alt="Compliance QR">
          </div>

          <div>
            <h4 style="font-size: 14.5px; font-weight:700; color: var(--lisa-green);">${c.manufacturer}</h4>
            <p style="font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top:2px;">${c.productName}</p>
          </div>

          <div style="font-family: var(--font-mono); font-size:11.5px; font-weight:700; color: var(--lisa-green);">${c.verificationId}</div>

          <div style="display: flex; flex-direction:column; gap: 8px; width: 100%; margin-top: 4px;">
            <div style="display: flex; gap: 8px; width: 100%;">
              <button class="btn-secondary" style="flex: 1; padding: 6px 10px; font-size:12px;" onclick="copyQRGateway('${c.verificationId}')">Copy Link</button>
              <button class="btn-secondary" style="flex: 1; padding: 6px 10px; font-size:12px;" onclick="testVerification('${c.verificationId}')">Test Gate</button>
            </div>
            <div style="display: flex; gap: 8px; width: 100%;">
              <button class="btn-primary" style="flex: 1; padding: 6px 10px; font-size:12px;" onclick="downloadQRImage('${c.verificationId}')">Download</button>
              <button class="btn-gold" style="flex: 1; padding: 6px 10px; font-size:12px;" onclick="printSingleLabel('${c.id}')">Print tag</button>
            </div>
            <div style="display: flex; gap: 8px; width: 100%; margin-top: 4px;">
              <button class="btn-secondary" style="flex: 1; padding: 6px 10px; font-size:12px;" onclick="document.getElementById('qr-upload-${c.id}').click()">Upload Custom</button>
              <input type="file" id="qr-upload-${c.id}" style="display:none;" accept="image/*" onchange="handleQRUpload('${c.id}', this)">
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function copyQRGateway(verificationId) {
      const verifyLink = window.location.origin + '/verify.html?id=' + verificationId;
      navigator.clipboard.writeText(verifyLink).then(() => {
        alert("Public verification gateway link copied successfully.");
      }).catch(err => {
        console.error("Failed to copy path: ", err);
      });
    }

    function testVerification(verificationId) {
      window.open(`verify.html?id=${verificationId}`, "_blank");
    }

    function downloadQRImage(verificationId) {
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(window.location.origin + '/verify.html?id=' + verificationId)}`;
      
      const a = document.createElement("a");
      a.href = qrUrl;
      a.target = "_blank";
      a.download = `LiSA_QR_${verificationId}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function printSingleLabel(certId) {
      const cert = certificates.find(c => c.id === certId);
      if (!cert) return;

      const verifyUrl = window.location.origin + '/verify.html?id=' + cert.verificationId;
      const qrImageUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(verifyUrl)}`;

      const printArea = document.getElementById("print-matrix-area");
      printArea.innerHTML = `
        <div style="border: 4px solid #C5A85A; padding: 24px; border-radius:12px; max-width: 480px; margin: 40px auto; font-family: sans-serif; background-color:#fff;">
          <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #0D3F26; padding-bottom: 12px; margin-bottom: 16px;">
            <div>
              <h1 style="color: #0D3F26; font-size:24px; margin:0; font-family:'Outfit', sans-serif;">LiSA</h1>
              <p style="color: #C5A85A; font-size:10px; text-transform:uppercase; margin:2px 0 0 0; font-weight:700; letter-spacing:0.5px;">Liberia Standards Authority</p>
            </div>
            <div style="font-family:monospace; font-size: 13px; background-color:#F4F6F5; padding:4px 8px; border-radius:4px; font-weight:bold;">${cert.id}</div>
          </div>
          
          <div style="display:flex; gap:20px; align-items:center;">
            <div style="border:1px solid #E6EAE8; padding:8px; border-radius:6px; background:#fff;">
              <img style="width: 130px; height: 130px;" src="${qrImageUrl}">
            </div>
            <div style="flex-grow:1;">
              <div style="font-size:11px; text-transform:uppercase; color:#6B7280; font-weight:700;">Manufacturer</div>
              <div style="font-size:14px; font-weight:bold; color:#0D3F26; margin-bottom:8px;">${cert.manufacturer}</div>
              
              <div style="font-size:11px; text-transform:uppercase; color:#6B7280; font-weight:700;">Product</div>
              <div style="font-size:13px; font-weight:600; color:#1F2937; margin-bottom:8px;">${cert.productName}</div>
              
              <div style="font-size:11px; text-transform:uppercase; color:#6B7280; font-weight:700;">Clearance ID</div>
              <div style="font-family:monospace; font-size:12.5px; font-weight:bold; color:#0D3F26;">${cert.verificationId}</div>
            </div>
          </div>
          
          <div style="border-top: 1px dashed #C5A85A; margin-top:16px; padding-top:10px; text-align:center; font-size:10px; color:#6B7280; font-weight:bold;">
            OFFICIAL DIGITAL STANDARDS QUALITY CLEARANCE TAG
          </div>
        </div>
      `;

      // Trigger window print
      window.print();
    }

    function handleQRUpload(certId, input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById('qr-img-' + certId);
          if (img) {
            img.src = e.target.result;
          }
        };
        reader.readAsDataURL(input.files[0]);
      }
    }
  </script>
</body>
</html>
